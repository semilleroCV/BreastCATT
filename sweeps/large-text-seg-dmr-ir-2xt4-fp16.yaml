method: bayes
metric:
  goal: maximize
  name: sensitivity
parameters:
  # max_train_samples: # for debug purposes
  #  value: 100
  #max_eval_samples: # for debug purposes
  #  value: 50
  use_cross_attn:
    value: true
  use_segmentation:
    value: true
  vit_version:
    distribution: categorical
    values:
      - large
  dataset_name:
    distribution: categorical
    values:
      - SemilleroCV/DMR-IR
  alpha:
    distribution: categorical
    values:
      - 0.1
      - 0.3
      - 0.5
      - 0.7
      - 0.9
      - 1.0
  checkpointing_steps:
    value: null
  learning_rate:
    distribution: log_uniform
    max: 2e-5
    min: 5e-6
  num_train_epochs:
    value: 30
  num_warmup_steps:
    value: 200
  per_device_eval_batch_size:
    value: 80
  per_device_train_batch_size:
    value: 40
program: train_w_precomputed.py

command:
  - ${env}
  - accelerate
  - launch
  - --num_processes=2
  - ${program}
  - ${args}