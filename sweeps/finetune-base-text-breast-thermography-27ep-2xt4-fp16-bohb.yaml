method: bayes
metric:
  goal: minimize
  name: test_loss

early_terminate:
  type: hyperband
  # max_iter is the max number of epochs a single run can have. this must be a high power of eta
  max_iter: 27
  # eta is the reduction factor. It will keep the top 1/eta runs. 3 is a standard value.
  eta: 3
  # Specify the total number of brackets (required for max_iter)
  s: 3

parameters:
  # max_train_samples: # for debug purposes
  #  value: 100
  #max_eval_samples: # for debug purposes
  #  value: 50
  use_cross_attn:
    value: true
  use_segmentation:
    value: false
  vit_version:
    distribution: categorical
    values:
      - pretrained
  model_name_or_path:
    distribution: categorical
    values:
      - SemilleroCV/tfvit-base-text-dmr-ir
  dataset_name:
    distribution: categorical
    values:
      - SemilleroCV/BreastThermography
  checkpointing_steps:
    value: null
  learning_rate:
    distribution: log_uniform_values
    max: 1.0e-05
    min: 1.0e-06
  weight_decay:
    distribution: log_uniform_values
    max: 0.02
    min: 0.01
  num_train_epochs:
    value: 27
  per_device_eval_batch_size:
    value: 256
  per_device_train_batch_size:
    distribution: categorical
    values:
      - 32
      - 64
program: train_w_precomputed.py

command:
  - ${env}
  - accelerate
  - launch
  - --num_processes=2
  - ${program}
  - ${args}