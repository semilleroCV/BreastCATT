method: bayes
metric:
  goal: maximize
  name: sensitivity
parameters:
  # max_train_samples: # for debug purposes
  #  value: 100
  #max_eval_samples: # for debug purposes
  #  value: 50
  use_cross_attn:
    value: true
  use_segmentation:
    value: false
  vit_version:
    distribution: categorical
    values:
      - base
  dataset_name:
    distribution: categorical
    values:
      - SemilleroCV/DMR-IR
  alpha:
    distribution: categorical
    values:
      - 0.1
      - 0.3
      - 0.5
      - 0.7
      - 0.9
      - 1.0
  checkpointing_steps:
    value: null
  learning_rate:
    distribution: uniform
    max: 0.0001
    min: 2.5e-05
  num_train_epochs:
    value: 30
  per_device_eval_batch_size:
    value: 300
  per_device_train_batch_size:
    value: 150
program: train_w_precomputed.py

command:
  - ${env}
  - accelerate
  - launch
  - --num_processes=2
  - ${program}
  - ${args}