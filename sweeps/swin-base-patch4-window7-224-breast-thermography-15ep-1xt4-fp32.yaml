method: bayes
metric:
  goal: minimize
  name: train_loss
parameters:
  # max_train_samples: # for debug purposes
  #  value: 100
  #max_eval_samples: # for debug purposes
  #  value: 50
  model_name_or_path:
    distribution: categorical
    values:
      - microsoft/swin-base-patch4-window7-224
  dataset_name:
    distribution: categorical
    values:
      - SemilleroCV/BreastThermography
  checkpointing_steps:
    value: null
  learning_rate:
    distribution: log_uniform_values
    max: 2.5e-05
    min: 1.0e-05
  weight_decay:
    distribution: log_uniform_values
    max: 0.1
    min: 0.001
  num_train_epochs:
    value: 15
  per_device_eval_batch_size:
    value: 64
  per_device_train_batch_size:
    value: 32
program: finetune.py

command:
  - ${env}
  - accelerate
  - launch
  - --num_processes=1
  - ${program}
  - ${args}